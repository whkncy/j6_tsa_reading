                    <h2 class="text-4xl font-extrabold tracking-tight mt-4 mb-3">Improve Your English Reading Skills</h2>
                    <p class="text-indigo-200 max-w-xl mx-auto text-sm sm:text-base font-light">Select an authentic Territory-wide System Assessment text module below to challenge yourself with interactive comprehension diagnostics.</p>
                </div>
                
                <h3 class="text-xl font-bold text-slate-900 mb-6 flex items-center">
                    <span class="w-2.5 h-5 bg-indigo-600 rounded-full mr-2.5 inline-block"></span>
                    Available Reading Comprehension Tasks (${TASKS_DATABASE.length})
                </h3>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            `;

            TASKS_DATABASE.forEach(task => {
                html += `
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all duration-200 flex flex-col justify-between overflow-hidden group">
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-3">
                                <span class="px-2.5 py-1 rounded-md text-xs font-semibold bg-slate-100 text-slate-600 border border-slate-200/60">${task.type}</span>
                                <span class="text-xs font-bold px-2 py-0.5 rounded ${task.difficulty === 'Easy' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : task.difficulty === 'Medium' ? 'bg-amber-50 text-amber-700 border border-amber-200' : 'bg-rose-50 text-rose-700 border border-rose-200'}">${task.difficulty}</span>
                            </div>
                            <h4 class="text-base font-bold text-slate-900 mb-1 group-hover:text-indigo-600 transition-colors">${task.title}</h4>
                            <p class="text-xs text-slate-400 mb-3 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                Source: ${task.source}
                            </p>
                        </div>
                        <div class="px-5 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                            <span class="text-xs font-medium text-slate-500 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mr-1 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                Est: ${task.readingTime}
                            </span>
                            <button onclick="router.practice('${task.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-xs px-4 py-2 rounded-lg transition-colors shadow-sm shadow-indigo-100">
                                Launch Practice
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }
        router.practice = router.toPractice; // Bridge routing commands

        // Render Active Interactive Practice View Grid Layout
        function renderPracticeView(taskId) {
            const task = TASKS_DATABASE.find(t => t.id === taskId);
            const container = document.getElementById('main-view');
            
            let html = `
                <div class="mb-4">
                    <button onclick="router.toDashboard()" class="text-xs font-semibold text-slate-600 hover:text-indigo-600 flex items-center bg-white border border-slate-200 px-3 py-1.5 rounded-lg shadow-sm transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg> Return to Cover Page
                    </button>
                </div>

                <div class="grid lg:grid-cols-12 gap-8 items-start">
                    <!-- Left Column: Source Texts panel -->
                    <div class="lg:col-span-5 lg:sticky lg:top-6 space-y-4">
                        <div class="bg-indigo-900 text-white px-4 py-3 rounded-xl shadow-sm">
                            <span class="text-xs font-bold uppercase tracking-wider text-indigo-300 block mb-0.5">Reading Content Material</span>
                            <h2 class="text-lg font-bold">${task.title}</h2>
                        </div>
                        <div class="max-h-[75vh] overflow-y-auto custom-scrollbar pr-1">
                            ${task.contextText}
                        </div>
                    </div>

                    <!-- Right Column: Interactive Diagnostic Check Form Frame -->
                    <div class="lg:col-span-7 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                        <div class="flex justify-between items-center border-b pb-4 border-slate-100">
                            <h3 class="text-lg font-bold text-slate-900">Comprehension Assessment</h3>
                            <span class="text-xs font-medium text-slate-500">${task.questions.length} Multiple Choice Items</span>
                        </div>
                        
                        <form id="quiz-form" onsubmit="event.preventDefault(); evaluateQuiz();" class="space-y-8">
            `;

            task.questions.forEach((q, qIndex) => {
                html += `
                    <div id="card-${q.id}" class="p-5 rounded-xl border border-slate-100 bg-white transition-all duration-200">
                        <div class="flex items-start space-x-3 mb-4">
                            <span class="bg-slate-900 text-white font-bold text-xs px-2 py-1 rounded mt-0.5 shadow-sm">${q.num}</span>
                            <p class="text-sm sm:text-base font-semibold text-slate-800">${q.question}</p>
                        </div>
                        
                        <!-- Skill Target Indicator Badging System -->
                        <div class="mb-3.5 flex items-center text-xs text-indigo-700 font-medium bg-indigo-50 px-2.5 py-1 rounded-md w-max border border-indigo-100/40">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mr-1 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
                            Core Skill Focus: ${q.skill}
                        </div>

                        <div class="space-y-2">
                `;

                q.options.forEach((opt, oIndex) => {
                    const optionLetter = String.fromCharCode(65 + oIndex);
                    html += `
                        <label id="label-${q.id}-${oIndex}" class="flex items-center p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all duration-150 text-sm">
                            <input type="radio" name="${q.id}" value="${oIndex}" 
                                ${state.answers[q.id] == oIndex ? 'checked' : ''} 
                                ${state.submitted ? 'disabled' : ''}
                                onclick="registerAnswer('${q.id}', ${oIndex})"
                                class="h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-500 mr-3">
                            <span class="font-bold text-slate-400 mr-2">${optionLetter}.</span>
                            <span class="text-slate-700 font-medium">${opt}</span>
                        </label>
                    `;
                });

                html += `
                        </div>
                        <!-- Micro Explanation Panel Injection Block -->
                        <div id="explain-${q.id}" class="hidden mt-4 p-3.5 rounded-lg text-xs leading-relaxed transition-all"></div>
                    </div>
                `;
            });

            html += `
                        <div class="pt-4 border-t border-slate-100 flex items-center justify-between">
                            <div id="validation-alert" class="text-xs text-rose-600 font-medium invisible">Please complete all assessment fields first.</div>
                            <button type="submit" id="submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm px-6 py-2.5 rounded-xl transition-all shadow-md shadow-indigo-100">
                                Check My Answers
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            `;
            container.innerHTML = html;
        }

        // Handle active option selections on form element context nodes
        window.registerAnswer = function(questionId, optionIndex) {
            state.answers[questionId] = optionIndex;
            // Add a visual selected ring style logic
            const currentTask = TASKS_DATABASE.find(t => t.id === state.currentTaskId);
            const targetQuestion = currentTask.questions.find(q => q.id === questionId);
            
            targetQuestion.options.forEach((_, idx) => {
                const targetLabel = document.getElementById(`label-${questionId}-${idx}`);
                if(idx === optionIndex) {
                    targetLabel.classList.add('border-indigo-600', 'bg-indigo-50/40');
                } else {
                    targetLabel.classList.remove('border-indigo-600', 'bg-indigo-50/40');
                }
            });
        };

        // Real-time Automated Checking Core Diagnostics Pipeline Engine 
        window.evaluateQuiz = function() {
            const currentTask = TASKS_DATABASE.find(t => t.id === state.currentTaskId);
            
            // Validation step check
            let answeredCount = Object.keys(state.answers).length;
            if(answeredCount < currentTask.questions.length) {
                const alertNode = document.getElementById('validation-alert');
                alertNode.classList.remove('invisible');
                setTimeout(() => alertNode.classList.add('invisible'), 3000);
                return;
            }

            state.submitted = true;
            let score = 0;

            // Lock submission execution button configuration metrics context
            const subBtn = document.getElementById('submit-btn');
            subBtn.disabled = true;
            subBtn.classList.replace('bg-indigo-600', 'bg-slate-300');
            subBtn.innerText = "Assessment Evaluated";

            currentTask.questions.forEach(q => {
                const userSelection = parseInt(state.answers[q.id]);
                const correctAnswerIndex = q.answer;
                const cardNode = document.getElementById(`card-${q.id}`);
                const explainNode = document.getElementById(`explain-${q.id}`);

                // Strip baseline structural styling contexts
                cardNode.classList.remove('border-slate-100');
                explainNode.classList.remove('hidden');

                if(userSelection === correctAnswerIndex) {
                    score++;
                    cardNode.classList.add('border-emerald-200', 'bg-emerald-50/20');
                    explainNode.classList.add('bg-emerald-50', 'text-emerald-800', 'border', 'border-emerald-100');
                    explainNode.innerHTML = `<strong>✓ Correct:</strong> ${q.explanation}`;
                } else {
                    cardNode.classList.add('border-rose-200', 'bg-rose-50/20');
                    explainNode.classList.add('bg-rose-50', 'text-rose-800', 'border', 'border-rose-100');
                    explainNode.innerHTML = `<strong>✗ Incorrect:</strong> The right answer is option <strong>${String.fromCharCode(65 + correctAnswerIndex)}</strong>.<br><span class="mt-1 block">${q.explanation}</span>`;
                }

                // Mutate option UI frames to signal mapping vectors directly
                q.options.forEach((_, oIndex) => {
                    const labelNode = document.getElementById(`label-${q.id}-${oIndex}`);
                    labelNode.classList.remove('hover:bg-slate-50', 'cursor-pointer');
                    
                    if(oIndex === correctAnswerIndex) {
                        labelNode.classList.add('bg-emerald-100/70', 'border-emerald-500', 'text-emerald-900', 'font-medium');
                    }
                    if(oIndex === userSelection && userSelection !== correctAnswerIndex) {
                        labelNode.classList.add('bg-rose-100/70', 'border-rose-400', 'text-rose-900');
                    }
                });
            });

            // Set global scores summary header element metrics text contextual strings frame indicators
            const globalStats = document.getElementById('global-stats');
            globalStats.innerText = `Score: ${score} / ${currentTask.questions.length} Checked`;
            globalStats.classList.remove('hidden');
            
            // Scroll user smooth velocity to terminal panel header workspace context area view limits
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Initialize Router Core State Engine Instantiation Runtime
        document.addEventListener("DOMContentLoaded", () => {
            router.toDashboard();
        });
    </script>
</body>
</html>
